<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Multijugador - Tutti Frutti</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #7a4dff, #8ecbff, #7a4dff);
      background-size: 250% 250%;
      animation: waveBg 4s ease-in-out infinite;
      padding: 35px 0;
    }
    @keyframes waveBg {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .lobby-card {
      width: 720px; /* más grande que el lobby */
      padding: 48px;
      border-radius: 22px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 15px 45px rgba(95,45,171,0.28);
      text-align: center;
      animation: cardDrop 0.7s ease-out;
    }
    @keyframes cardDrop {
      0%   { opacity: 0; transform: translateY(-20px) scale(0.97); filter: blur(4px); }
      70%  { opacity: 1; transform: translateY(4px) scale(1.02); filter: blur(0); }
      100% { transform: translateY(0) scale(1); }
    }

    #logo {
        width: 180px;
        margin-bottom: 25px;

        filter: drop-shadow(0 0 14px rgba(143, 92, 255, 0.5));
        animation: logoPulse 3s infinite ease-in-out;
    }
    h2 { font-weight: 800; color:#392b51; font-size:30px; margin-bottom:18px; }

    .menu-btn {
      width: 100%;
      font-size: 18px;
      font-weight: 700;
      padding: 14px;
      border-radius: 28px;
      margin-bottom: 14px;
      transition: all .25s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg,#7a4dff,#3da4ff);
      border: none; color: white;
      box-shadow: 0 5px 20px rgba(125,75,255,0.35);
    }
    .btn-primary:hover { transform: translateY(-4px) scale(1.02); background: linear-gradient(135deg,#8c5eff,#1d90ff); }
    
    .btn-secondary {
        background: #34fa4f;
        background: linear-gradient(90deg,rgba(52, 250, 79, 1) 0%, rgba(87, 199, 133, 1) 76%, rgba(79, 247, 177, 1) 100%);
        border: none; color: white;
        box-shadow: 0 5px 20px rgba(125,75,255,0.35);
    }
    .btn-secondary:hover { transform: translateY(-4px) scale(1.02); background: linear-gradient(90deg,rgba(52, 250, 79, 1) 0%, rgba(87, 199, 133, 1) 76%, rgba(79, 247, 177, 1) 100%); }
    .btn-secondary:hover { transform: translateY(-4px); }
    
    .btn-back {
      background: rgba(130, 130, 130, 1);
      border: none; color: white;
      box-shadow: 0 5px 20px rgba(125,75,255,0.35);
      padding: 14px;
      border-radius: 30px;
      width: 60%;
      
    }
    .btn-back:hover {color: white; transform: translateY(-4px) scale(1.02); background: rgba(50, 50, 50, 0.35); }
    

    .muted { color:#444; margin-top:8px; }
  </style>
</head>
<body>
  <div class="lobby-card">
    <img id="logo" src="/images/logoOficial.png" alt="Logo Tutti Frutti"/>
    <h2>Multijugador</h2>

    <a href="/modo-multijugador/crear" class="btn btn-primary menu-btn">Crear sala</a>
    <a href="/modo-multijugador/unirse" class="btn btn-secondary menu-btn">Unirse a sala</a>

    <p class="muted">Tu usuario: <strong th:text="${username}">Jugador</strong></p>
    
    <div class="d-flex justify-content-center">
        <a href="/lobby" class="btn btn-back menu-btn">Volver al Lobby</a>
    </div>    
  </div>
</body>
</html>
