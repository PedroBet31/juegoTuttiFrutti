<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Unirse a Sala - Tutti Frutti</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0;
      font-family:'Poppins',sans-serif; background: linear-gradient(135deg,#7a4dff,#8ecbff,#7a4dff);
      padding:35px 0; background-size:250% 250%; animation: waveBg 4s ease-in-out infinite;
    }
    @keyframes waveBg { 0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%} }

    .card-main {
      max-width: 520px; padding:32px; border-radius:18px; background: rgba(255,255,255,0.78);
      box-shadow:0 12px 30px rgba(95,45,171,0.2);
    }
    h2 { color:#392b51; font-weight:800; margin-bottom:12px; }
    .btn-prim { background:linear-gradient(135deg,#7a4dff,#3da4ff); color:white; border:none; padding:10px 16px; border-radius:20px; font-weight:800; }
  </style>
</head>
<body>
  <div class="card-main">
    <h2>Unirse a sala</h2>
    <p>Introduce el ID de la sala para unirte.</p>

    <div th:if="${errorMessage}" 
        class="alert alert-danger mt-3" 
        style="font-weight:700; border-radius:12px;">
       <span th:text="${errorMessage}"></span>
   </div>

    <form onsubmit="join(event)">
      <div class="mb-3">
        <label class="form-label">ID de sala</label>
        <input id="roomId" class="form-control" required />
      </div>

      <button class="btn btn-prim" type="submit">Entrar</button>
      <a href="/modo-multijugador" class="btn btn-outline-secondary mt-3 d-inline-block">Cancelar</a>
    </form>
  </div>

<script>
  function join(e) {
    e.preventDefault();
    const roomId = document.getElementById('roomId').value.trim();
    if (roomId) window.location.href = "/modo-multijugador/sala/" + encodeURIComponent(roomId);
  }
</script>
</body>
</html>
