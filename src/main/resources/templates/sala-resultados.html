<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados - Sala</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      margin:0;
      min-height:100vh;
      font-family:'Poppins',sans-serif;
      background: linear-gradient(135deg,#7a4dff,#8ecbff,#7a4dff);
      background-size:250% 250%;
      animation: waveBg 4s ease-in-out infinite;
      padding:35px 0;
      display:flex;
      justify-content:center;
      align-items:flex-start;
    }
    @keyframes waveBg {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }
    .result-card {
      background: rgba(255,255,255,0.75);
      border-radius: 26px;
      padding: 35px;
      backdrop-filter: blur(15px);
      box-shadow: 0 12px 34px rgba(94,51,180,0.28);
      animation: fadeIn .7s ease-out both;
      width: 980px;
    }
    @keyframes fadeIn {
      0%{opacity:0; transform:translateY(30px)}
      100%{opacity:1; transform:translateY(0)}
    }
    h1 { font-weight:900; color:#392b51; text-shadow:0 2px 8px rgba(0,0,0,0.15); }
    h2,h4,h5 { font-weight:800; color:#4d3572; }
    table {
      border-radius:18px;
      overflow:hidden;
      background:rgba(255,255,255,0.85);
    }
    thead {
      background: linear-gradient(135deg,#7a4dff,#3da4ff) !important;
      color:white !important;
    }
    tbody tr:hover { background: rgba(125,75,255,0.08); }
    .badge-result {
      font-size:.9rem;
      font-weight:800;
      padding:6px 12px;
      border-radius:12px;
    }
    .veredicto-VALIDA { background:#2ecc71; color:white }
    .veredicto-INVALIDA { background:#e74c3c; color:white }
    .veredicto-VACIA { background:#7f8c8d; color:white }
    .veredicto-VALIDA_DUPLICADA { background:#f39c12; color:white }
    .btn-main {
      background: linear-gradient(135deg,#7a4dff,#3da4ff);
      border:none;
      padding:12px 28px;
      font-weight:800;
      border-radius:20px;
      color:white;
      box-shadow:0 6px 20px rgba(90,40,190,0.35);
      transition:.25s ease;
      margin-right:10px;
    }
    .btn-main:hover { transform:translateY(-3px); }
    .btn-secondary-custom {
      border:2px solid #7a4dff;
      padding:12px 28px;
      border-radius:20px;
      font-weight:800;
      color:#7a4dff;
      background:white;
      transition:.25s ease;
    }
    .btn-secondary-custom:hover {
      transform:translateY(-3px);
      background:#f4f0ff;
    }
    .player-box {
      margin-top:25px;
      padding:20px;
      border-radius:18px;
      background:rgba(255,255,255,0.65);
      box-shadow:0 4px 16px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="result-card">

  <span id="roomId" th:text="${roomId}" style="display:none"></span>
  <span id="username" th:text="${username}" style="display:none"></span>

  <div class="text-center mb-4">
    <h1>Resultados de la Ronda</h1>
    <h2>Sala: <span id="roomIdUI"></span></h2>
  </div>

  <div id="rondaContainer"></div>

  <div class="text-center mt-4">
    <a id="nextBtn" class="btn-main" style="display:none">Siguiente</a>
    <a href="/modo-multijugador" class="btn-secondary-custom">Salir</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>

const roomId = (document.getElementById("roomId").textContent || "").trim();
const rawName = (document.getElementById("username").textContent || "").trim();
const myName = rawName ? rawName.toLowerCase() : "";

document.getElementById("roomIdUI").textContent = roomId || "(unknown)";

let stompClient = null;
let hostName = null; 
let playersPingRetries = 0;
const MAX_PING_RETRIES = 5;
const PING_RETRY_MS = 300; 

const raw = sessionStorage.getItem("multiplayerRoundResult");
if (raw) {
    try {
        const dto = JSON.parse(raw);
        window.lastDto = dto;
        if (dto && dto.ronda) renderRonda(dto.ronda);
        renderButtons(dto);
    } catch(e) {
        console.error("[sala-resultados] no pude parsear sessionStorage multiplayerRoundResult", e);
    }
}

function connect() {
  const sock = new SockJS('/ws');
  stompClient = Stomp.over(sock);

  stompClient.connect({}, () => {

    console.log("[sala-resultados] WS conectado, subscribiendo topics...");

    stompClient.subscribe(`/topic/room/${roomId}/players`, msg => {
       try {
           const data = JSON.parse(msg.body);
           hostName = (data.hostName || "").trim().toLowerCase();
           console.debug("[sala-resultados] received /players:", data, "hostName:", hostName);

           // re-render botones usando el DTO guardado (si hay)
           if (window.lastDto) {
               renderButtons(window.lastDto);
           }

           updateHostButtons();

       } catch(e) {
           console.error("[sala-resultados] error parseando /players", e);
       }
    });

    stompClient.subscribe(`/topic/room/${roomId}/round-result`, msg => {
      try {
        const dto = JSON.parse(msg.body);
        window.lastDto = dto;
        sessionStorage.setItem("multiplayerRoundResult", msg.body);

        console.debug("[sala-resultados] received /round-result", dto);

        renderRonda(dto.ronda);
        renderButtons(dto);

        if (!hostName) {
            console.debug("[sala-resultados] round-result llegó pero sin hostName => ping players");
            sendPlayersPingWithRetries();
        } else {
            updateHostButtons();
        }

      } catch(e) {
        console.error("[sala-resultados] error parseando round-result", e);
      }
    });

    stompClient.subscribe(`/topic/room/${roomId}/round-start`, msg => {
      sessionStorage.setItem("multiplayerRoundStart", msg.body);
      window.location.href = `/modo-multijugador/game/${roomId}`;
    });

    stompClient.subscribe(`/topic/room/${roomId}/go-final`, () => {
      window.location.href = `/modo-multijugador/final/${roomId}`;
    });

    sendPlayersPingWithRetries();

    document.getElementById("nextBtn").onclick = () => {
        if (stompClient && stompClient.connected) {
            stompClient.send(`/app/room/${roomId}/start`, {}, "{}");
        } else {
            console.warn("[sala-resultados] intento iniciar ronda pero WS no conectado");
        }
    };

  }, err => {
      console.error("[sala-resultados] error conectando WS:", err);
  });
}

function sendPlayersPingWithRetries() {
    playersPingRetries = 0;
    attemptPlayersPing();
}

function attemptPlayersPing() {
    if (!stompClient || !stompClient.connected) {
        setTimeout(() => {
            if (!stompClient || !stompClient.connected) connect();
        }, PING_RETRY_MS);
        return;
    }

    try {
        stompClient.send(`/app/room/${roomId}/players-ping`, {}, "{}");
    } catch(e) {
        console.warn("[sala-resultados] fallo enviando players-ping:", e);
    }

    setTimeout(() => {
        if (!hostName && playersPingRetries < MAX_PING_RETRIES) {
            playersPingRetries++;
            console.debug(`[sala-resultados] players-ping retry ${playersPingRetries}`);
            attemptPlayersPing();
        } else if (!hostName) {
            console.warn("[sala-resultados] no llegó hostName tras reintentos; botones ocultos hasta recibir players");
            updateHostButtons();
        } else {
            // ya tenemos hostName; aseguramos render
            if (window.lastDto) {
                renderButtons(window.lastDto);
                updateHostButtons();
            }
        }
    }, PING_RETRY_MS);
}

function renderRonda(ronda){
  const container = document.getElementById("rondaContainer");
  container.innerHTML = "";

  if (!ronda) {
    container.innerHTML = "<p class='text-center'>No hay resultados aún.</p>";
    return;
  }

  const h = document.createElement("h3");
  h.className = "text-center mb-4";
  h.innerHTML = "Letra: <strong>" + escapeHtml(String(ronda.letra)) + "</strong>";
  container.appendChild(h);

  const byPlayer = {};
  (ronda.respuestas || []).forEach(r => {
    const j = (r.jugador && r.jugador.nombre) ? r.jugador.nombre : "Anon";
    (byPlayer[j] = byPlayer[j] || []).push(r);
  });

  for (const jugador of Object.keys(byPlayer)) {
    const box = document.createElement("div");
    box.className = "player-box";
    const isHost = hostName && jugador.trim().toLowerCase() === hostName;
    const displayName = isHost ? `${jugador} [HOST]` : jugador;
    box.innerHTML = `<h4>${escapeHtml(displayName)}</h4>`;

    const table = document.createElement("table");
    table.className = "table table-striped text-center mt-3";

    table.innerHTML =
      `<thead>
        <tr>
          <th>Categoría</th>
          <th>Respuesta</th>
          <th>Veredicto</th>
          <th>Motivo</th>
          <th>Puntos</th>
        </tr>
      </thead>`;

    const tbody = document.createElement("tbody");

    byPlayer[jugador].forEach(r => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${escapeHtml(r.categoria?.nombre ?? "")}</td>
        <td>${escapeHtml(r.texto ?? "")}</td>
        <td><span class="badge-result veredicto-${escapeHtml(r.veredicto ?? '')}">${escapeHtml(r.veredicto ?? '')}</span></td>
        <td>${escapeHtml(r.motivo ?? "")}</td>
        <td>${escapeHtml(String(r.puntos ?? 0))}</td>
      `;
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    box.appendChild(table);
    container.appendChild(box);
  }
}

function renderButtons(dto) {
    const nextBtn = document.getElementById("nextBtn");
    let finalBtn = document.getElementById("verFinalBtn");

    if (!finalBtn) {
        finalBtn = document.createElement("a");
        finalBtn.id = "verFinalBtn";
        finalBtn.className = "btn-main";
        finalBtn.style.display = "none";
        finalBtn.textContent = "Ver resultado final";
        finalBtn.style.marginRight = "10px";
        nextBtn.parentElement.insertBefore(finalBtn, nextBtn);
    }

    if (!dto) {
        nextBtn.style.display = "none";
        finalBtn.style.display = "none";
        return;
    }

    const quedan = dto.quedanRondas ?? dto.isQuedanRondas ?? false;

    if (quedan) {
        nextBtn.style.display = "inline-block";
        finalBtn.style.display = "none";
    } else {
        nextBtn.style.display = "none";
        finalBtn.style.display = "inline-block";
        finalBtn.onclick = () => {
            if (stompClient && stompClient.connected) {
                stompClient.send(`/app/room/${roomId}/go-final`, {}, "{}");
            }
        };
    }
}

function updateHostButtons() {
    const nextBtn = document.getElementById("nextBtn");
    const finalBtn = document.getElementById("verFinalBtn");

    if (!hostName || !myName) {
        if (nextBtn) nextBtn.style.display = "none";
        if (finalBtn) finalBtn.style.display = "none";
        return;
    }

    if (hostName === myName) {
        if (nextBtn && nextBtn.style.display !== "none") nextBtn.style.display = "inline-block";
        if (finalBtn && finalBtn.style.display !== "none") finalBtn.style.display = "inline-block";
    } else {
        if (nextBtn) nextBtn.style.display = "none";
        if (finalBtn) finalBtn.style.display = "none";
    }
}

function escapeHtml(str) {
  if (!str) return "";
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

connect();

</script>

</body>
</html>
