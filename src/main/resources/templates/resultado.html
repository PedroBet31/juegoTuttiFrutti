<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resultados - Tutti Frutti</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>

    <style>

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;

            background: linear-gradient(135deg, #7a4dff, #8ecbff, #7a4dff);
            background-size: 250% 250%;
            animation: waveBg 4s ease-in-out infinite;

            padding: 35px 0;
        }

        @keyframes waveBg {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .result-card {
            background: rgba(255, 255, 255, 0.75);
            border-radius: 26px;
            padding: 40px;
            backdrop-filter: blur(15px);
            box-shadow: 0 12px 34px rgba(94, 51, 180, 0.28);

            animation: fadeIn 0.7s ease-out both;
        }

        @keyframes fadeIn {
            0%   { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 900;
            letter-spacing: 1px;
            color: #392b51;
            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        h2 {
            font-weight: 800;
            color: #4d3572;
            text-shadow: 0 2px 6px rgba(0,0,0,0.13);
        }

        table {
            border-radius: 18px;
            overflow: hidden;
            background: rgba(255,255,255,0.85);
        }

        thead {
            background: linear-gradient(135deg, #7a4dff, #3da4ff) !important;
            color: white !important;
        }

        tbody tr {
            transition: background 0.25s ease;
        }

        tbody tr:hover {
            background: rgba(125, 75, 255, 0.08);
        }

        .badge-result {
            font-size: 0.95rem;
            padding: 7px 12px;
            border-radius: 12px;
            font-weight: 800;
        }

        .veredicto-VALIDA {
            background: #2ecc71;
            color: white;
        }

        .veredicto-INVALIDA {
            background: #e74c3c;
            color: white;
        }

        .veredicto-VACIA {
            background: #7f8c8d;
            color: white;
        }

        .veredicto-VALIDA_DUPLICADA {
            background: #f39c12;
            color: white;
        }

        .puntaje-final {
            font-size: 2.7rem;
            font-weight: 900;
            margin-top: 25px;
            color: #392b51;
            text-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .btn-next,
        .btn-volver {
            background: linear-gradient(135deg, #7a4dff, #3da4ff);
            border: none;
            padding: 13px 34px;
            font-size: 1.15rem;
            font-weight: 800;
            border-radius: 20px;
            color: white;
            box-shadow: 0 6px 20px rgba(90, 40, 190, 0.35);
            transition: 0.25s ease;
        }

        .btn-next:hover,
        .btn-volver:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 24px rgba(90, 40, 190, 0.45);
        }

        .btn-next { margin-right: 10px; }
    </style>
</head>

<body>

<div class="container">

    <div class="text-center mb-4">
        <h1>Resultados de la Ronda</h1>
        <h2>Letra: <span th:text="${ronda.letra}"></span></h2>
        <p>
            Ronda <span th:text="${rondaIndex}"></span>
            de <span th:text="${totalRondas}"></span>
        </p>
    </div>

    <div class="result-card mx-auto col-md-10 col-lg-8">

        <table class="table table-striped text-center mb-4">
            <thead>
                <tr>
                    <th>Categoría</th>
                    <th>Respuesta</th>
                    <th>Veredicto</th>
                    <th>Motivo</th>
                    <th>Puntos</th>
                </tr>
            </thead>

            <tbody>
            <tr th:each="resp : ${ronda.respuestas}">
                <td th:text="${resp.categoria.nombre}"></td>

                <td th:text="${resp.texto}"></td>

                <td>
                    <span class="badge-result"
                          th:class="'badge-result veredicto-' + ${resp.veredicto}"
                          th:text="${resp.veredicto}">
                    </span>
                </td>

                <td th:text="${resp.motivo}"></td>
                <td th:text="${resp.puntos}"></td>
            </tr>
            </tbody>
        </table>

        <div class="text-center puntaje-final">
            Puntaje total:
            <span th:text="${jugador.puntaje}"></span>
        </div>

        <div class="text-center mt-4">

            <form method="post"
                  th:action="@{/resultado/siguiente}"
                  style="display:inline-block;">
                <button type="submit" class="btn-next" th:if="${quedan}">
                    Siguiente ronda
                </button>
            </form>

            <a th:if="${!quedan}" href="/resultado-final-individual" class="btn-volver">
                Ver resultado final
            </a>


            <a href="/lobby" class="btn-volver" style="margin-left:12px;">
                Volver al Lobby
            </a>

        </div>

    </div>

</div>

</body>
</html>
