<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="utf-8"/>
  <title>Resultado Final - Sala</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      margin:0;
      min-height:100vh;
      font-family:'Poppins',sans-serif;
      background: linear-gradient(135deg,#7a4dff,#8ecbff,#7a4dff);
      background-size:250% 250%;
      animation: waveBg 4s ease-in-out infinite;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:40px 0;
    }

    @keyframes waveBg {
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .card-final{
      width:980px;
      padding:28px;
      border-radius:14px;
      background:rgba(255,255,255,0.95);
      backdrop-filter:blur(12px);
      box-shadow:0 12px 34px rgba(94,51,180,0.18);
      animation: fadeIn .6s ease-out both;
    }

    @keyframes fadeIn {
      0%{opacity:0; transform:translateY(18px)}
      100%{opacity:1; transform:translateY(0)}
    }

    h1, h3{
      font-weight:900;
      color:#392b51;
      text-shadow:0 2px 8px rgba(0,0,0,0.06);
    }

    .winner-box{
      padding:18px;
      border-radius:12px;
      background:rgba(255,255,255,0.85);
      text-align:center;
      margin-bottom:18px;
      box-shadow:0 6px 20px rgba(0,0,0,0.06);
    }

    .winner-name{
      font-size:1.8rem;
      font-weight:900;
      color:#4d3572;
    }

    .btn-main{
      background: linear-gradient(135deg,#7a4dff,#3da4ff);
      border:none;
      padding:11px 24px;
      font-size:1rem;
      font-weight:800;
      border-radius:14px;
      color:white;
      box-shadow:0 6px 20px rgba(90,40,190,0.18);
      transition:.2s ease;
    }

    .btn-main:hover{ transform:translateY(-3px); }

    #loading {
      text-align:center;
      color:#555;
      margin:12px 0;
      font-size:1.1rem;
    }

    .muted-small { color:#666; font-size:1rem; font-weight:600; text-align:center; }
  </style>
</head>

<body>

<div class="card-final container">
  <h1 class="text-center mb-3">Resultado Final</h1>

  <span id="roomId" th:text="${roomId}" style="display:none"></span>

  <div id="winnerBox" class="winner-box" style="display:none;">
    <h4>🏆 GANADOR 🏆</h4>
    <div class="winner-name" id="winnerName"></div>
    <div style="font-size:1.05rem;">Puntos: <span id="winnerPoints"></span></div>
  </div>

  <div id="loading">Cargando ranking...</div>

  <div id="ranking"></div>

  <div class="text-center mt-4">
    <a href="/modo-multijugador" class="btn-main">Volver al menú</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
(function(){

  function escapeHtml(str) {
    if (str === null || str === undefined) return "";
    return String(str)
      .replaceAll('&','&amp;')
      .replaceAll('<','&lt;')
      .replaceAll('>','&gt;')
      .replaceAll('"','&quot;')
      .replaceAll("'","&#039;");
  }

  const roomId = (document.getElementById("roomId").textContent || "").trim();
  if (!roomId) { window.location.href = "/modo-multijugador"; return; }

  const loadingEl = document.getElementById("loading");
  const rankingEl = document.getElementById("ranking");
  const winnerBox = document.getElementById("winnerBox");
  const winnerNameEl = document.getElementById("winnerName");
  const winnerPointsEl = document.getElementById("winnerPoints");

  let stompClient = null;

  function connect() {
    const socket = new SockJS('/ws');
    stompClient = Stomp.over(socket);

    stompClient.connect({}, () => {

      stompClient.subscribe(`/topic/room/${roomId}/final`, msg => {
        try {
          const payload = JSON.parse(msg.body);
          renderFinal(payload);
        } catch (e) {
          console.error("Error parseando /final:", e);
        }
      });

      // pedir ranking
      stompClient.send(`/app/room/${roomId}/get-final`, {}, "{}");

    }, err => {
      loadingEl.textContent = "Error conectando al servidor.";
    });
  }

  function findRanking(data) {
    if (!data) return null;
    if (Array.isArray(data)) return data;
    if (data.ranking && Array.isArray(data.ranking)) return data.ranking;
    return null;
  }

  function renderFinal(payload) {
    const ranking = findRanking(payload);

    if (!ranking || ranking.length === 0) {
      loadingEl.textContent = "No hay datos del ranking final.";
      rankingEl.innerHTML = "";
      return;
    }

    loadingEl.style.display = "none";

    const winner = ranking[0];
    winnerNameEl.textContent = winner.nombre ?? "Jugador";
    winnerPointsEl.textContent = winner.puntaje ?? 0;
    winnerBox.style.display = "block";

    let html = `
      <table class="table table-striped text-center mt-3">
        <thead>
          <tr><th>Pos</th><th>Jugador</th><th>Puntos</th></tr>
        </thead>
        <tbody>
    `;

    ranking.forEach((p, i) => {
      const nombre = p.nombre ?? p.getNombre ?? "Jugador";
      const puntos = p.puntaje ?? 0;
      html += `
        <tr>
          <td>${i+1}</td>
          <td>${escapeHtml(nombre)}</td>
          <td>${escapeHtml(puntos)}</td>
        </tr>
      `;
    });

    html += "</tbody></table>";

    rankingEl.innerHTML = html;
  }

  connect();

})();
</script>

</body>
</html>
