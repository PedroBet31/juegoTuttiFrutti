<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lobby - Tutti Frutti</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;

            background: linear-gradient(135deg, #7a4dff, #8ecbff, #7a4dff);
            background-size: 250% 250%;
            animation: waveBg 4s ease-in-out infinite;

            padding: 35px 0;
        }

        @keyframes waveBg {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .lobby-card {
            width: 450px;
            padding: 50px;
            border-radius: 25px;

            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);

            box-shadow: 0 15px 45px rgba(95, 45, 171, 0.3);
            text-align: center;

            animation: cardDrop 0.7s ease-out;
        }

        @keyframes cardDrop {
            0%   { opacity: 0; transform: translateY(-20px) scale(0.97); filter: blur(4px); }
            70%  { opacity: 1; transform: translateY(4px) scale(1.02); filter: blur(0); }
            100% { transform: translateY(0) scale(1); }
        }

        #logo {
            width: 180px;
            margin-bottom: 25px;

            filter: drop-shadow(0 0 14px rgba(143, 92, 255, 0.5));
            animation: logoPulse 3s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%   { filter: drop-shadow(0 0 14px rgba(143, 92, 255, 0.45)); }
            50%  { filter: drop-shadow(0 0 24px rgba(143, 92, 255, 0.7)); }
            100% { filter: drop-shadow(0 0 14px rgba(143, 92, 255, 0.45)); }
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 800;
            color: #392b51;
            font-size: 32px;
        }

        .menu-btn {
            width: 100%;
            font-size: 19px;
            font-weight: 700;
            padding: 15px;
            border-radius: 28px;
            margin-bottom: 18px;
            transition: all 0.25s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7a4dff, #3da4ff);
            border: none;
            color: white;

            box-shadow: 0 5px 20px rgba(125, 75, 255, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            background: linear-gradient(135deg, #8c5eff, #1d90ff);
            box-shadow: 0 8px 28px rgba(125, 75, 255, 0.45);
        }

        .btn-secondary {
            background: rgba(80, 80, 80, 0.3);
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 600;
            opacity: 1;
        }

        .btn-secondary:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(80, 80, 80, 0.4);
        }
    </style>
</head>

<body>

<div class="lobby-card">
    <img id="logo" src="/images/logoOficial.png" alt="Logo Tutti Frutti"/>

    <h2>Elegí tu modo</h2>

    <a href="/modo-individual" class="btn btn-primary menu-btn">Individual</a>

    <a href="/modo-multijugador" class="btn btn-secondary menu-btn">Multijugador</a>

    <form method="post" action="/logout">
        <button type="submit" class="btn btn-tertiary menu-btn">
            Cerrar sesión
        </button>
    </form>
</div>

</body>
</html>
